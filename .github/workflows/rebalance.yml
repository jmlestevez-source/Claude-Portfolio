# .github/workflows/rebalance.yml

name: Portfolio Rebalance

on:
  schedule:
    - cron: "0 7 * * 1"   # Lunes 7:00 UTC
    - cron: "0 7 * * 4"   # Jueves 7:00 UTC
  workflow_dispatch:        # Ejecución manual desde GitHub UI

jobs:
  rebalance:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run rebalance
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python rebalance.py
      
      - name: Commit results
        run: |
          git config user.name "Portfolio Bot"
          git config user.email "bot@portfolio.com"
          git add data/
          git diff --staged --quiet || git commit -m \
            "Rebalance $(date +%Y-%m-%d): auto-generated"
          git push

      # ── ARREGLADO: v4 en lugar de v3 ──────────────────
      - name: Upload rebalance report
        uses: actions/upload-artifact@v4
        with:
          name: rebalance-report-${{ github.run_id }}
          path: data/rebalances/
          retention-days: 90

      # ── EMAIL NOTIFICATION ─────────────────────────────
      - name: Send email notification
        if: always()   # Envía también si hay error
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          to: ${{ secrets.EMAIL_TO }}
          from: Portfolio Autopilot <${{ secrets.EMAIL_USERNAME }}>
          subject: |
            Portfolio Rebalance ${{ job.status == 'success' && '✅' || '❌' }} - ${{ github.run_id }}
          body: |
            Rebalance ejecutado: ${{ github.run_id }}
            Estado: ${{ job.status }}
            Fecha: ${{ github.event.head_commit.timestamp }}
            
            Ver resultados completos:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
            
            Ver portfolio actualizado:
            https://github.com/${{ github.repository }}/blob/main/data/positions/current.json
          # Email con el reporte adjunto
          attachments: data/rebalances/*.json
